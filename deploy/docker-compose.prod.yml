services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Redis is only reached by app and worker over the compose network.
    # No host ports published.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  app:
    image: ghcr.io/rynaro/prisma-bot:${IMAGE_TAG:-latest}
    command: ["pnpm", "--filter", "@prisma-bot/github-app", "run", "start:app"]
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/healthz/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${PRISMA_DOMAIN}`) && (PathPrefix(`/webhooks/github`) || PathPrefix(`/healthz`))"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=3000"

  worker:
    image: ghcr.io/rynaro/prisma-bot:${IMAGE_TAG:-latest}
    command: ["pnpm", "--filter", "@prisma-bot/github-app", "run", "start:worker"]
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  traefik:
    image: traefik:v3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./acme.json:/acme.json
    depends_on:
      - app

volumes:
  redis_data:
