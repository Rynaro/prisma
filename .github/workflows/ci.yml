name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: typecheck / lint / test (containerized)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        run: docker compose --profile tools build tools

      - name: Install workspace dependencies
        run: make install

      - name: Typecheck
        run: make typecheck

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Run eval
        run: make eval

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/last-report.md
          if-no-files-found: ignore
