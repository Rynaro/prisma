services:
  redis:
    image: redis:7-alpine
    # Redis is only reached by app and worker over the compose network.
    # If you need redis-cli, use: docker compose exec redis redis-cli
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      target: dev
    image: prisma-bot/dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: ["pnpm", "--filter", "@prisma-bot/github-app", "run", "dev:app"]
    # Host port is configurable to avoid conflicts with other local services.
    # Set APP_HOST_PORT in your environment or .env to override the default 3030.
    # The container always listens on 3000 internally.
    ports:
      - "${APP_HOST_PORT:-3030}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "3000"
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: dev
    image: prisma-bot/dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: ["pnpm", "--filter", "@prisma-bot/github-app", "run", "dev:worker"]
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  tools:
    build:
      context: .
      target: dev
    image: prisma-bot/dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: ["sleep", "infinity"]
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    environment:
      NODE_ENV: development
    profiles: ["tools"]

volumes:
  node_modules:
  pnpm_store:
  redis_data:
