id: missing-tests
name: "Missing tests for new public function"
description: >-
  A medium-severity tests-category finding on a new exported function. The
  finding clears the severity and confidence floors and is published inline
  under summary-plus-inline. Exercises comment_usefulness and the inline
  confidence-threshold behaviour.

config_overrides:
  mode: summary-plus-inline
  thresholds:
    severity_floor:
      inline: medium
    confidence_floor:
      inline: 0.7
  comment_cap:
    per_pr: 5
    per_file: 1

pr_payload:
  action: opened
  installation:
    id: 1000
  repository:
    id: 2000
    full_name: octocat/hello-world
  pull_request:
    number: 43
    head:
      sha: cccccccccccccccccccccccccccccccccccccccc

octokit_responses:
  pulls_get:
    number: 43
    head:
      sha: cccccccccccccccccccccccccccccccccccccccc
      ref: feature/missing-tests
    base:
      sha: dddddddddddddddddddddddddddddddddddddddd
      ref: main
  pulls_list_files:
    - filename: src/payments/charge.ts
      status: modified
      additions: 5
      deletions: 0
      patch: |
        @@ -1,3 +1,8 @@
         export const cents = (n) => n * 100;
        +
        +export function chargeCents(amountCents) {
        +  return amountCents * 1.0;
        +}
        +

provider_script:
  - kind: output
    output:
      findings:
        - path: src/payments/charge.ts
          line: 4
          severity: medium
          category: tests
          message: "New public function chargeCents lacks tests; add unit tests covering currency rounding edge cases"
          rationale: "The function handles money; introducing it without coverage risks rounding regressions surfaced only in production."
          confidence: 0.78

expectations:
  prefilter:
    outcome: accepted
    skipped_paths: []
    skipped_reasons: []
    files_sent_to_provider: 1
  provider:
    calls: 1
  validator:
    findings: 1
    rejection_reasons: []
  ranker:
    output_size_eq_input: true
  publisher:
    inline_count: 1
    summary_count: 0
    dropped_count: 0
    publication_state: succeeded
    summary_contains: ["tests"]
    expected_categories: ["tests"]
    rejection_reasons: []

metrics:
  - comment_usefulness
  - confidence_threshold_behavior
