id: custom-instructions-threaded
name: "Custom instructions and path-scoped rules reach the provider"
description: >-
  A PR with a TypeScript source file. The repo config has global instructions
  and a path-scoped instruction matching the changed file. The eval verifies
  that the review pipeline runs to completion (publication_state: succeeded)
  with custom guidance threaded through to the provider. The FakeProvider
  emits one finding; the pipeline publishes it normally. This scenario proves
  that user-customizable review prompts (global instructions + path_instructions)
  reach the provider without breaking the review pipeline.

config_overrides:
  mode: summary-plus-inline
  review_guidance:
    instructions: "Always check for proper error handling and logging."
    path_instructions:
      - path: "src/**"
        instructions: "Enforce strict TypeScript types; no implicit any."
    context_files: []

pr_payload:
  action: opened
  installation:
    id: 1000
  repository:
    id: 2000
    full_name: octocat/hello-world
    name: hello-world
    owner:
      login: octocat
  pull_request:
    number: 42
    head:
      sha: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

octokit_responses:
  pulls_get:
    number: 42
    head:
      sha: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      ref: feature/add-api
    base:
      sha: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
      ref: main
  pulls_list_files:
    - filename: src/api/handler.ts
      status: modified
      additions: 5
      deletions: 2
      patch: |
        @@ -10,4 +10,7 @@
         export function handleRequest(req: Request) {
        -  const data = req.body;
        +  const data = req.body as RequestData;
        +  if (!data) {
        +    throw new Error('Missing request body');
        +  }
           return process(data);
         }

provider_script:
  - kind: output
    output:
      findings:
        - path: src/api/handler.ts
          line: 13
          severity: medium
          category: correctness
          message: "Missing null check for process() return value"
          rationale: "process() may return null but result is used without checking."
          confidence: 0.80

expectations:
  prefilter:
    outcome: accepted
    skipped_paths: []
    skipped_reasons: []
    files_sent_to_provider: 1
  provider:
    calls: 1
  validator:
    findings: 1
    rejection_reasons: []
  ranker:
    output_size_eq_input: true
  publisher:
    inline_count: 1
    summary_count: 0
    dropped_count: 0
    publication_state: succeeded
    summary_contains: ["MEDIUM"]
    expected_categories: ["correctness"]
    rejection_reasons: []

metrics:
  - custom_guidance_threading
  - comment_usefulness
